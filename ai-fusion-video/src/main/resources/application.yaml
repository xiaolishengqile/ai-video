spring:
  application:
    name: ai-fusion-video

  threads:
    virtual:
      enabled: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB

  profiles:
    active: local

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 18080
  tomcat:
    max-part-count: 1000

# 应用配置
app:
  storage:
    local-base-path: ./data/media

video:
  compose:
    ffmpeg-path: ${VIDEO_COMPOSE_FFMPEG_PATH:ffmpeg}
    ffprobe-path: ${VIDEO_COMPOSE_FFPROBE_PATH:ffprobe}
